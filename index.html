<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIIT – Student Performance System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--indigo:#4f46e5;--indigo-d:#3730a3;--green:#16a34a;--red:#dc2626;--amber:#d97706;--sky:#0ea5e9;--purple:#7c3aed}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0f172a;color:#1e293b}
.hidden{display:none!important}

/* ── ANIMATED BACKGROUND ── */
.bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-mesh{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 30%,#312e81 0%,transparent 60%),radial-gradient(ellipse 70% 50% at 80% 80%,#1e1b4b 0%,transparent 60%),linear-gradient(180deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.25;animation:drift 12s ease-in-out infinite alternate}
.orb1{width:500px;height:500px;background:#4f46e5;top:-100px;left:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:#7c3aed;bottom:-80px;right:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:#0ea5e9;top:40%;left:50%;animation-delay:-8s}
@keyframes drift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.08)}}
.grid-lines{position:absolute;inset:0;background-image:linear-gradient(rgba(99,102,241,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.06) 1px,transparent 1px);background-size:50px 50px}

/* ── LOGIN ── */
.login-page{position:relative;z-index:10;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.login-card{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:2.5rem;width:100%;max-width:440px;box-shadow:0 25px 60px rgba(0,0,0,.5)}
.login-brand{text-align:center;margin-bottom:1.75rem}
.login-brand .logo-ring{width:56px;height:56px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;box-shadow:0 0 30px rgba(79,70,229,.5)}
.login-brand h1{font-size:1.3rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
.login-brand p{font-size:.8rem;color:#94a3b8}
.role-tabs{display:flex;gap:6px;margin-bottom:1.5rem;background:rgba(255,255,255,.05);padding:4px;border-radius:10px}
.role-tab{flex:1;padding:.45rem;text-align:center;border:none;background:transparent;border-radius:7px;font-size:.82rem;cursor:pointer;color:#94a3b8;font-weight:500;transition:all .2s}
.role-tab.active{background:rgba(79,70,229,.8);color:#fff;box-shadow:0 2px 8px rgba(79,70,229,.4)}
.form-group{margin-bottom:1rem}
.form-group label{display:block;font-size:.78rem;font-weight:500;color:#cbd5e1;margin-bottom:.35rem}
.form-group input,.form-group select{width:100%;padding:.65rem .9rem;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;font-size:.88rem;color:#f1f5f9;outline:none;transition:border .2s}
.form-group input::placeholder{color:#64748b}
.form-group input:focus,.form-group select:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.login-btn{width:100%;padding:.75rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:9px;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:.5rem;box-shadow:0 4px 20px rgba(79,70,229,.4)}
.login-btn:hover{opacity:.9}
.login-hint{font-size:.75rem;color:#64748b;text-align:center;margin-top:.9rem;line-height:1.5}
.err-msg{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;padding:.6rem .9rem;border-radius:8px;font-size:.82rem;margin-bottom:1rem;display:none}

/* ── APP SHELL ── */
.app-shell{position:relative;z-index:10;display:flex;min-height:100vh}
.sidebar{width:250px;background:rgba(15,23,42,.85);backdrop-filter:blur(20px);border-right:1px solid rgba(255,255,255,.08);padding:1.25rem 1rem;display:flex;flex-direction:column;flex-shrink:0}
.sb-brand{padding:.5rem .75rem 1.25rem;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:.75rem}
.sb-brand h2{font-size:1rem;font-weight:700;color:#f1f5f9;letter-spacing:-.3px}
.sb-brand p{font-size:.73rem;color:#64748b;margin-top:.15rem}
.nav-section{font-size:.68rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:.4rem .75rem;margin-top:.75rem}
.nav-item{padding:.55rem .75rem;border-radius:8px;cursor:pointer;font-size:.83rem;color:#94a3b8;display:flex;align-items:center;gap:.6rem;transition:all .18s;margin-bottom:.1rem}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:linear-gradient(135deg,rgba(79,70,229,.35),rgba(124,58,237,.2));color:#a5b4fc;border:1px solid rgba(99,102,241,.25)}
.sb-footer{margin-top:auto;padding-top:1rem;border-top:1px solid rgba(255,255,255,.08)}
.user-badge{display:flex;align-items:center;gap:.65rem;padding:.5rem .75rem}
.avatar{width:36px;height:36px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:.82rem;font-weight:600;color:#e2e8f0}
.user-role{font-size:.71rem;color:#64748b}
.logout-btn{width:100%;margin-top:.6rem;padding:.4rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#94a3b8;border-radius:7px;font-size:.78rem;cursor:pointer;transition:all .2s}
.logout-btn:hover{background:rgba(239,68,68,.15);color:#fca5a5;border-color:rgba(239,68,68,.3)}

/* ── MAIN ── */
.main-area{flex:1;padding:1.75rem;overflow-y:auto;min-width:0;background:rgba(15,23,42,.4)}
.page{display:none}
.page.active{display:block}
.pg-title{font-size:1.25rem;font-weight:700;color:#f1f5f9;margin-bottom:.2rem}
.pg-sub{font-size:.82rem;color:#64748b;margin-bottom:1.5rem}

/* ── GLASS CARDS ── */
.g-card{background:rgba(255,255,255,.05);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:1.25rem}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:.85rem;margin-bottom:1.25rem}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:1rem 1.1rem}
.stat-val{font-size:1.7rem;font-weight:800;color:#f1f5f9;line-height:1}
.stat-lbl{font-size:.73rem;color:#64748b;margin-top:.3rem}
.stat-badge{font-size:.7rem;padding:.18rem .45rem;border-radius:5px;display:inline-block;margin-top:.4rem;font-weight:600}
.b-green{background:rgba(22,163,74,.2);color:#4ade80}
.b-blue{background:rgba(14,165,233,.2);color:#38bdf8}
.b-red{background:rgba(220,38,38,.2);color:#f87171}
.b-amber{background:rgba(217,119,6,.2);color:#fbbf24}
.b-purple{background:rgba(124,58,237,.2);color:#c4b5fd}

/* ── TABLES ── */
.tbl-wrap{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;overflow:hidden;margin-bottom:1.25rem}
.tbl-hdr{padding:.9rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem}
.tbl-ttl{font-size:.9rem;font-weight:600;color:#e2e8f0}
.search-box{padding:.4rem .75rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;font-size:.8rem;color:#e2e8f0;outline:none;width:190px}
.search-box::placeholder{color:#475569}
.search-box:focus{border-color:#6366f1}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{padding:.55rem .9rem;background:rgba(255,255,255,.04);color:#64748b;font-weight:600;text-align:left;border-bottom:1px solid rgba(255,255,255,.07);white-space:nowrap}
td{padding:.55rem .9rem;border-bottom:1px solid rgba(255,255,255,.04);color:#cbd5e1}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.grade-pill{padding:.18rem .48rem;border-radius:4px;font-size:.72rem;font-weight:700}
.g-S{background:rgba(22,163,74,.25);color:#4ade80}
.g-A{background:rgba(14,165,233,.25);color:#38bdf8}
.g-B{background:rgba(79,70,229,.25);color:#a5b4fc}
.g-C{background:rgba(217,119,6,.25);color:#fbbf24}
.g-D{background:rgba(234,88,12,.25);color:#fb923c}
.g-E{background:rgba(168,85,247,.25);color:#d8b4fe}
.g-F{background:rgba(220,38,38,.25);color:#f87171}
.g-MP{background:rgba(100,116,139,.2);color:#94a3b8}
.g-AB{background:rgba(100,116,139,.15);color:#64748b}

/* ── CHARTS ── */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.25rem}
.chart-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:1.1rem}
.chart-title{font-size:.85rem;font-weight:600;color:#e2e8f0;margin-bottom:1rem}
.bar-row{display:flex;align-items:center;gap:.65rem;margin-bottom:.5rem}
.bar-lbl{font-size:.74rem;color:#94a3b8;width:76px;flex-shrink:0;text-align:right}
.bar-track{flex:1;background:rgba(255,255,255,.06);border-radius:4px;height:22px;position:relative;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .5s ease}
.bar-fill span{font-size:.7rem;font-weight:700;color:rgba(255,255,255,.9)}
.bar-ext{font-size:.7rem;color:#64748b;width:32px;flex-shrink:0}

/* ── SGPA DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:.4rem}
.leg-item{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:#94a3b8}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── PROGRESS CARD ── */
.pc-wrap{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:1.5rem}
.pc-hdr{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem}
.pc-marks-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.6rem;margin:1rem 0}
.pc-m{text-align:center;padding:.65rem .4rem;border-radius:9px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
.pc-mv{font-size:1.2rem;font-weight:700;color:#f1f5f9}
.pc-ms{font-size:.68rem;color:#64748b;margin-top:.2rem}
.pc-mm{font-size:.65rem;color:#475569}
.divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:.85rem 0}
.info-row{display:flex;justify-content:space-between;font-size:.8rem;padding:.28rem 0}
.il{color:#64748b}
.iv{font-weight:600;color:#e2e8f0}

/* ── TOPPERS ── */
.topper-item{display:flex;align-items:center;gap:.85rem;padding:.6rem .9rem;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:9px;margin-bottom:.45rem}
.rank-b{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0}
.r1{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#78350f}
.r2{background:linear-gradient(135deg,#9ca3af,#d1d5db);color:#1f2937}
.r3{background:linear-gradient(135deg,#cd7c2f,#d97706);color:#fff}
.rn{background:rgba(79,70,229,.3);color:#a5b4fc}

/* ── STUDENT HERO ── */
.s-hero{background:linear-gradient(135deg,#312e81,#4c1d95);border:1px solid rgba(165,180,252,.2);border-radius:14px;padding:1.5rem;color:#f1f5f9;margin-bottom:1.1rem;box-shadow:0 10px 40px rgba(79,70,229,.3)}

/* ── GUIDANCE ── */
.guid-item{padding:.55rem .8rem;border-radius:8px;font-size:.8rem;margin-bottom:.4rem;display:flex;align-items:flex-start;gap:.55rem}
.guid-good{background:rgba(22,163,74,.12);border:1px solid rgba(22,163,74,.2);color:#4ade80}
.guid-warn{background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.2);color:#fbbf24}
.guid-bad{background:rgba(220,38,38,.12);border:1px solid rgba(220,38,38,.2);color:#f87171}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed rgba(99,102,241,.4);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;background:rgba(79,70,229,.04)}
.upload-zone:hover,.upload-zone.drag{border-color:#6366f1;background:rgba(79,70,229,.1)}
.upload-zone input[type=file]{display:none}
.upload-icon{font-size:2.5rem;margin-bottom:.75rem}
.upload-title{font-size:.95rem;font-weight:600;color:#e2e8f0;margin-bottom:.4rem}
.upload-sub{font-size:.78rem;color:#64748b}
.upload-result{margin-top:1.25rem;padding:1rem;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.25);border-radius:9px;display:none}
.upload-result.show{display:block}

/* ── MESSAGING ── */
.msg-thread{max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem;padding:.5rem}
.msg-bubble{padding:.65rem .9rem;border-radius:10px;font-size:.82rem;max-width:80%;line-height:1.5}
.msg-admin{background:rgba(79,70,229,.25);border:1px solid rgba(99,102,241,.3);color:#c7d2fe;align-self:flex-end}
.msg-faculty{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#cbd5e1;align-self:flex-start}
.msg-time{font-size:.68rem;color:#475569;margin-top:.25rem}
.msg-input-row{display:flex;gap:.65rem}
.msg-input{flex:1;padding:.6rem .85rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.83rem;color:#f1f5f9;outline:none;resize:none}
.msg-input:focus{border-color:#6366f1}
.send-btn{padding:.6rem 1rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer}
.send-btn:hover{opacity:.85}

/* ── SELECTORS ── */
.sel-row{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.1rem}
.sel-grp label{font-size:.75rem;font-weight:500;color:#94a3b8;display:block;margin-bottom:.3rem}
.sel-grp select{padding:.42rem .7rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;font-size:.8rem;color:#e2e8f0;outline:none;cursor:pointer}
.sel-grp select:focus{border-color:#6366f1}
.sel-grp select option{background:#1e293b;color:#e2e8f0}

/* ── ACTION BTN ── */
.act-btn{padding:.5rem 1rem;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem}
.act-btn:hover{opacity:.88}
.act-btn.outline{background:transparent;border:1px solid rgba(99,102,241,.5);color:#a5b4fc}
.act-btn.outline:hover{background:rgba(79,70,229,.15)}

/* ── CLASS BADGE ── */
.class-badge{display:inline-block;padding:.22rem .6rem;border-radius:5px;font-size:.72rem;font-weight:600}
.cls1{background:rgba(79,70,229,.25);color:#a5b4fc}
.cls2{background:rgba(14,165,233,.25);color:#38bdf8}
.cls3{background:rgba(22,163,74,.25);color:#4ade80}
.cls4{background:rgba(217,119,6,.25);color:#fbbf24}
.cls5{background:rgba(168,85,247,.25);color:#d8b4fe}

@media(max-width:768px){.chart-grid{grid-template-columns:1fr}.sidebar{width:200px}}
@media print{.sidebar,.act-btn,.upload-zone,.msg-input-row,.sel-row{display:none!important}.main-area{padding:.5rem}.app-shell{display:block}.bg-wrap{display:none}}
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="bg-wrap">
  <div class="bg-mesh"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="grid-lines"></div>
</div>

<!-- LOGIN -->
<div class="login-page" id="loginPage">
<div class="login-card">
  <div class="login-brand">
    <div class="logo-ring">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M7 20V10l7 6 7-6v10" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>VIIT Performance System</h1>
    <p>Vignan's Institute of Information Technology · VSP</p>
  </div>
  <div class="role-tabs">
    <button class="role-tab active" id="tab-student" onclick="setRole('student',this)">Student</button>
    <button class="role-tab" id="tab-faculty" onclick="setRole('faculty',this)">Faculty</button>
    <button class="role-tab" id="tab-admin" onclick="setRole('admin',this)">Admin</button>
  </div>
  <div class="err-msg" id="errMsg"></div>
  <div class="form-group" id="classGroup" style="display:none">
    <label>Class</label>
    <select id="loginClass">
      <option value="1">Class 1 – CSE-CS (25L31A46xx)</option>
      <option value="2">Class 2 – CSE-AI (25L31A47xx)</option>
      <option value="3">Class 3 – CSE-DS (25L31A48xx)</option>
      <option value="4">Class 4 – CSE-CY (25L31A49xx)</option>
      <option value="5">Class 5 – CSE-IoT (25L31A50xx)</option>
    </select>
  </div>
  <div class="form-group">
    <label id="idLbl">Roll Number</label>
    <input type="text" id="loginId" placeholder="e.g. 25L31A4601">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="loginPwd" placeholder="Enter password">
  </div>
  <button class="login-btn" onclick="doLogin()">Sign In</button>
  <div class="login-hint" id="loginHint">Student: roll number as ID · password = last 2 digits of roll number</div>
</div>
</div>

<!-- APP -->
<div class="app-shell hidden" id="appShell">
  <div class="sidebar" id="sidebar">
    <div class="sb-brand">
      <h2 id="sbTitle">VIIT</h2>
      <p id="sbSub">Academic System</p>
    </div>
    <div id="navLinks"></div>
    <div class="sb-footer">
      <div class="user-badge">
        <div class="avatar" id="avatarEl">?</div>
        <div>
          <div class="user-name" id="dispName">–</div>
          <div class="user-role" id="dispRole">–</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="main-area" id="mainArea"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════════════

// Class definitions
const CLASSES = {
  "1": {name:"Class 1",branch:"CSE-CS",prefix:"25L31A46",rolls:74,offset:1},
  "2": {name:"Class 2",branch:"CSE-AI",prefix:"25L31A47",rolls:65,offset:1},
  "3": {name:"Class 3",branch:"CSE-DS",prefix:"25L31A48",rolls:70,offset:1},
  "4": {name:"Class 4",branch:"CSE-CY",prefix:"25L31A49",rolls:60,offset:1},
  "5": {name:"Class 5",branch:"CSE-IoT",prefix:"25L31A50",rolls:55,offset:1}
};

// Faculty assignments
const FACULTY = {
  "faculty4678": {cls:"1",name:"Dr. P. Ramakrishna"},
  "faculty5532": {cls:"2",name:"Dr. S. Lakshmi"},
  "faculty6641": {cls:"3",name:"Prof. K. Venkata Rao"},
  "faculty7790": {cls:"4",name:"Dr. M. Srinivas"},
  "faculty8801": {cls:"5",name:"Prof. A. Padmavathi"}
};

const SUBJ = ['LAC','Chem','EG','BCME','IP'];
const SUBNAMES = {LAC:'Linear Algebra & Calculus',Chem:'Chemistry',EG:'Engineering Graphics',BCME:'Basic Civil & Mech Engg',IP:'Intro to Programming'};
const MID_MAX = {LAC:25,Chem:25,EG:30,BCME:25,IP:25};

// Build roll numbers for each class
function buildRolls(cls) {
  const c = CLASSES[cls];
  const rolls = [];
  for(let i=0; i<c.rolls; i++) {
    rolls.push(c.prefix + String(c.offset+i).padStart(2,'0'));
  }
  return rolls;
}

// Seeded random for consistent data
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

// Class 1 real Mid-1 data from DOCX

// Generate synthetic data for classes 2–5
const GRADES_DIST = ['S','S','A','A','A','B','B','B','C','C','D','E','F'];
const MID_RANGES = [[20,25],[15,24],[18,25],[12,20],[8,15]];

function genMid(seed,roll,cls) {
  const r = seededRand(seed);
  const tier = r() < 0.6 ? 0 : r() < 0.85 ? 1 : r() < 0.95 ? 2 : 3;
  const range = MID_RANGES[Math.min(tier, MID_RANGES.length-1)];
  const obj = {};
  SUBJ.forEach(s => {
    if(r() < 0.04) { obj[s] = null; return; }
    const max = MID_MAX[s];
    const pct = range[0]/25 + r()*(range[1]-range[0])/25;
    obj[s] = Math.round(max * pct * 10) / 10;
  });
  return obj;
}

function genFinal(seed,midData) {
  const r = seededRand(seed + 9999);
  const midTotal = SUBJ.reduce((s,k)=>s+(midData[k]||0),0);
  const midMax = Object.values(MID_MAX).reduce((a,b)=>a+b,0);
  const pct = midTotal / midMax;
  const baseSGPA = 5.0 + pct * 5.0 + (r()-0.5)*0.8;
  const sgpa = Math.max(3.5, Math.min(10.0, Math.round(baseSGPA*100)/100));
  const gradeForPct = (p) => {
    if(p>0.9) return 'S'; if(p>0.8) return 'A';
    if(p>0.7) return 'B'; if(p>0.6) return 'C';
    if(p>0.5) return 'D'; if(p>0.35) return 'E'; return 'F';
  };
  const obj = {SemSGPA:sgpa, CGPA:sgpa};
  SUBJ.forEach(s=>{
    const mp = midData[s]; if(mp===null||mp===undefined){obj[s]='F';return;}
    const sp = mp/MID_MAX[s] * (0.7 + r()*0.3);
    obj[s] = gradeForPct(sp);
  });
  obj.ChemLAB = gradeForPct(0.6+r()*0.4);
  obj.CPLAB = gradeForPct(0.6+r()*0.4);
  obj.EWS = gradeForPct(0.5+r()*0.5);
  obj.HW = gradeForPct(0.7+r()*0.3);
  return obj;
}

// Build all classes data cache
const DATA_CACHE = {};

function getClassData(cls) {
  if(DATA_CACHE[cls]) return DATA_CACHE[cls];
  const c = CLASSES[cls];
  const rolls = buildRolls(cls);
  const mid1 = {}, final_ = {};

  if(cls==='1') {
    rolls.forEach(r => { mid1[r] = CLASS1_MID1[r] || {LAC:18,Chem:18,EG:24,BCME:18,IP:18}; });
    rolls.forEach(r => { final_[r] = CLASS1_FINAL[r] || {LAC:'B',EG:'B',Chem:'B',BCME:'B',IP:'B',ChemLAB:'A',CPLAB:'A',EWS:'A',HW:'S',SemSGPA:8.0,CGPA:8.0}; });
  } else {
    rolls.forEach((r,i) => {
      const seed = parseInt(cls)*1000 + i;
      mid1[r] = genMid(seed, r, cls);
    });
    rolls.forEach((r,i) => {
      const seed = parseInt(cls)*1000 + i + 500;
      final_[r] = genFinal(seed, mid1[r]);
    });
  }
  DATA_CACHE[cls] = {rolls, mid1, final:final_};
  return DATA_CACHE[cls];
}

function doLogin(){
  const id = document.getElementById('loginId').value.trim().toUpperCase();
  const pwd = document.getElementById('loginPwd').value.trim();
  const err = document.getElementById('errMsg');
  err.style.display='none';

  if(activeRole==='student'){
    const cls = document.getElementById('loginClass').value;
    const {rolls} = getClassData(cls);
    const roll = id;
    if(!rolls.includes(roll)){showErr('Roll number not found in selected class.');return;}
    const lastTwo = roll.slice(-2);
    if(pwd!==lastTwo){showErr('Incorrect password. Use last 2 digits of roll number.');return;}
    currentUser={role:'student',id:roll,cls};
  } else if(activeRole==='faculty'){
    const fid = id.toLowerCase();
    const f = FACULTY[fid];
    if(!f || pwd!==fid){showErr('Invalid faculty credentials.');return;}
    currentUser={role:'faculty',id:fid,cls:f.cls,name:f.name};
  } else {
    if(id!=='ADMIN'||pwd!=='faculty4646'){showErr('Invalid admin credentials.');return;}
    currentUser={role:'admin',id:'admin'};
  }

  document.getElementById('loginPage').classList.add('hidden');
  document.getElementById('appShell').classList.remove('hidden');
  setupApp();
}

function genPC(cls){
  const roll=document.getElementById('pcSel').value;

function rankingPage(cls){
  const {rolls,mid1,final:fin}=getClassData(cls);
  // Sort by SemSGPA
  const byFinal=[...rolls].sort((a,b)=>fin[b].SemSGPA-fin[a].SemSGPA);
  // Sort by Mid-1 total
  const byMid=[...rolls].sort((a,b)=>{
    const ta=SUBJ.reduce((s,k)=>s+(mid1[a][k]||0),0);
    const tb=SUBJ.reduce((s,k)=>s+(mid1[b][k]||0),0);
    return tb-ta;
  });
  const subToppers=SUBJ.map(s=>{
    const best=rolls.filter(r=>mid1[r][s]!==null&&mid1[r][s]!==undefined)
      .sort((a,b)=>mid1[b][s]-mid1[a][s])[0];
    return{s,roll:best,mark:mid1[best][s]};
  });
  const rankRow=(r,i,score,label)=>`<div class="topper-item">
    <div class="rank-b ${i<1?'r1':i<2?'r2':i<3?'r3':'rn'}">${i+1}</div>
    <div style="flex:1;font-size:.85rem;font-weight:600;color:#e2e8f0">${r}</div>
    <div style="font-size:.82rem;font-weight:700;color:#a5b4fc">${score}</div>
  </div>`;
  return`<div class="pg-title">Rankings – ${CLASSES[cls].name}</div>
  <div class="pg-sub">Separate rankings by final SGPA and Mid-1 performance</div>
  <div class="chart-grid">
    <div>
      <div class="chart-title" style="margin-bottom:.75rem">🏆 Top 10 – Final Sem SGPA</div>
      ${byFinal.slice(0,10).map((r,i)=>rankRow(r,i,fin[r].SemSGPA,'SGPA')).join('')}
    </div>
    <div>
      <div class="chart-title" style="margin-bottom:.75rem">📝 Top 10 – Mid-1 Total</div>
      ${byMid.slice(0,10).map((r,i)=>{
        const t=SUBJ.reduce((s,k)=>s+(mid1[r][k]||0),0);
        return rankRow(r,i,t.toFixed(1)+' / '+Object.values(MID_MAX).reduce((a,b)=>a+b,0),'Mid-1');
      }).join('')}
    </div>
  </div>
  <div class="g-card" style="margin-top:1rem">
    <div class="chart-title" style="margin-bottom:.75rem">⭐ Mid-1 Subject Toppers</div>
    <div class="chart-grid" style="margin-bottom:0">
    ${subToppers.map(({s,roll,mark})=>`<div class="topper-item">
      <div class="rank-b r1" style="font-size:.68rem">${s}</div>
      <div style="flex:1;font-size:.85rem;font-weight:600;color:#e2e8f0">${roll}</div>
      <div style="font-size:.8rem;font-weight:700;color:#a5b4fc">${mark} / ${MID_MAX[s]}</div>
    </div>`).join('')}
    </div>
  </div>`;
}

function uploadPage(){

function handleFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=document.getElementById('uploadResult');
  const ri=document.getElementById('uploadInfo');
  r.classList.add('show');
  ri.textContent=`File: ${f.name} · Size: ${(f.size/1024).toFixed(1)} KB · Type: ${f.type||'unknown'}`;
}
function handleDrop(e){
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(f){const dt=new DataTransfer();dt.items.add(f);document.getElementById('fileInput').files=dt.files;handleFile(document.getElementById('fileInput'));}
}

function sendMsg(cls,from){

      <b>${m.from==='admin'?'Admin':'Faculty'}:</b> ${m.text}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function gradePill(g){
  if(!g||g==='–') return'<span class="grade-pill g-AB">–</span>';
  const map={S:'g-S',A:'g-A',B:'g-B',C:'g-C',D:'g-D',E:'g-E',F:'g-F',MP:'g-MP',H:'g-MP',AB:'g-AB',Y:'g-AB'};
  return`<span class="grade-pill ${map[g]||'g-AB'}">${g}</span>`;
}

function guidanceBlock(m){
  const items=SUBJ.map(s=>{
    const v=m[s];const max=MID_MAX[s];
    if(v===null||v===undefined) return`<div class="guid-item guid-bad">⚠ ${s} (${SUBNAMES[s]}): Absent in Mid-1. Contact faculty immediately.</div>`;
    const pct=(v/max)*100;
    if(pct>=80) return`<div class="guid-item guid-good">✓ ${s}: Excellent (${v}/${max}). Maintain this performance!</div>`;
    if(pct>=60) return`<div class="guid-item guid-warn">→ ${s}: Average (${v}/${max}). Review concepts and practice more problems.</div>`;
    return`<div class="guid-item guid-bad">✗ ${s}: Needs improvement (${v}/${max}). Consult faculty and focus on fundamentals.</div>`;
  }).join('');
  return`<div class="g-card" style="margin-top:1rem"><div class="chart-title" style="margin-bottom:.6rem">📌 Study Guidance</div>${items}</div>`;
}

function activateNav(el,pid){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const pg=document.getElementById(pid);if(pg)pg.classList.add('active');
}
